version: "2"
plugins:
  - name: gleam
    wasm:
      url: file://../../target/wasm32-wasip1/release/sqlc-gen-gleam.wasm
      sha256: b343d049d30068496a3e2299da13482161fe19fc48ba53e10b3e248801251b00
sql:
  - schema: "postgresql/authors/schema.sql"
    queries: "postgresql/authors/query.sql"
    engine: "postgresql"
    codegen:
      - plugin: gleam
        out: "postgresql/authors/generated"
  - schema: "postgresql/types/schema.sql"
    queries: "postgresql/types/query.sql"
    engine: "postgresql"
    codegen:
      - plugin: gleam
        out: "postgresql/types/generated"
