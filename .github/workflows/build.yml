name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test

      - name: Build WASM plugin
        run: cargo build --release --target wasm32-wasip1

      - name: Verify WASM artifact exists
        run: |
          ls -la target/wasm32-wasip1/release/sqlc-gen-gleam.wasm
          shasum -a 256 target/wasm32-wasip1/release/sqlc-gen-gleam.wasm

  generate-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.28.0"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM plugin
        run: cargo build --release --target wasm32-wasip1

      - name: Update sha256 in sqlc configs
        run: |
          SHA=$(shasum -a 256 target/wasm32-wasip1/release/sqlc-gen-gleam.wasm | cut -d ' ' -f 1)
          sed -i "s/sha256: .*/sha256: $SHA/" examples/authors/sqlc.yaml
          sed -i "s/sha256: .*/sha256: \"$SHA\"/" end2end/sqlc.yaml

      - name: Regenerate examples
        run: cd examples/authors && sqlc generate

      - name: Regenerate E2E code
        run: cd end2end && sqlc generate

      - name: Check no diff after regeneration
        run: |
          git diff --exit-code examples/ end2end/gleam_test_project/src/generated/
