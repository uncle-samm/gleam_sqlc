name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

      - name: Build WASM plugin
        run: cargo build --release --target wasm32-wasip1

      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp target/wasm32-wasip1/release/sqlc-gen-gleam.wasm dist/sqlc-gen-gleam.wasm
          cd dist && shasum -a 256 sqlc-gen-gleam.wasm > sqlc-gen-gleam.wasm.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sqlc-gen-gleam.wasm
            dist/sqlc-gen-gleam.wasm.sha256
          generate_release_notes: true
