name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_DB: sqlc_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -d sqlc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.28.0"

      - name: Install Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.14.0"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM plugin
        run: cargo build --release --target wasm32-wasip1

      - name: Update sha256 in E2E sqlc config
        run: |
          SHA=$(shasum -a 256 target/wasm32-wasip1/release/sqlc-gen-gleam.wasm | cut -d ' ' -f 1)
          sed -i "s/sha256: .*/sha256: \"$SHA\"/" end2end/sqlc.yaml

      - name: Load database schema
        run: |
          cat examples/config/postgresql/types/schema.sql examples/config/postgresql/authors/schema.sql | \
          PGPASSWORD=postgres psql -h localhost -U postgres -d sqlc_test -f -

      - name: Generate Gleam code
        run: cd end2end && sqlc generate

      - name: Build Gleam project
        run: cd end2end/gleam_test_project && gleam build

      - name: Run E2E tests
        env:
          # CI uses port 5432 directly; local dev uses 5433 to avoid conflicts
          POSTGRES_PORT: "5432"
        run: |
          sed -i 's/config.port(5433)/config.port(5432)/' end2end/gleam_test_project/test/sqlc_e2e_test_test.gleam
          cd end2end/gleam_test_project && gleam test
